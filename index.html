<!DOCTYPE html>
<html>
<head>
	<title>UwU</title>
	<body style="background-color: #08000e;">
	<link rel="stylesheet" type="text/css" href="styles.css" />
	<script type="text/javascript" src="js/controls.js"></script>
	<link href="https://fonts.googleapis.com/css2?family=Iceland&display=swap" rel="stylesheet"> 
	<script src="https://kit.fontawesome.com/ec9dc9741d.js" crossorigin="anonymous"></script>
</head>
<body>
	<div class="border">
		<h1 class="glow">FunnySuperst56</h1>
	</div>

	<div id="xbox" class="button-align1">
		<p id="Xbox" class="button" style="text-decoration:none;" target="_blank"><a  target="_blank">Xbox</a></p>
		<p id="steam" class="button" style="text-decoration:none;"><a href="https://steamcommunity.com/profiles/76561198369218674" target="_blank">Steam</a></p>
		<p id="spotify" class="button" style="text-decoration:none;"><a href="https://open.spotify.com/playlist/43LRf5Joe5i2eNUN4XTfVm?si=ZgF8ustHR4CRPY3mJG2GNw&utm_source=copy-link" target="_blank">Spotify</a></p>
	</div>
	<div id="xbox" class="button-align2">
		<p id="pinterest" class="button" style="text-decoration:none;"><a href="https://pin.it/6yMP56y" target="_blank">Pinterest</a></p>
		<p id="reddit" class="button" style="text-decoration:none;"><a href="https://www.reddit.com/user/funnysuperst56/" target="_blank">Reddit</a></p>
		<p id="instagram" class="button" style="text-decoration:none;"><a href="https://www.instagram.com/funnysuper_56/" target="_blank">Instagram</a></p>
	</div>

	<div class="music-player">
		<audio id="audio">
			<source id="audio-Source" src="Songs/Symbolism.mp3" type="audio/mpeg">
		</audio>
		
		<div class="music-info">
			<h4 id="title">Name song</h4>
			<div class="progress-container">
				<div class="progress-line"></div>
			</div>
		</div>

		<div class="image">
			<img src="Images/Symbolism.jpg" alt="music-cover" id="cover">
		</div>

		<div class="line-container">
			<span id="duration-start">0:00</span>
			<div class="line"></div>
			<span id="duration-update">0:00</span>
		</div>

		<div class="buttons-music">
			<button id="previous">
				<i class="fas fa-backward-step"></i>
			</button>
			<button id="play-pause">
				<i class="fas fa-play"></i>
			</button>
			<button id="next">
				<i class="fas fa-forward-step"></i>
			</button>
		</div>
	</div>
</body>
</html>
